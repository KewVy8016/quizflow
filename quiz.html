<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizFlow - Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="quiz-header">
            <button id="back-btn" class="btn-back">← กลับ</button>
            <h2 id="quiz-title">Quiz</h2>
            <div class="header-controls">
                <button id="shuffle-btn" class="btn-shuffle" title="เปิด/ปิดการสลับข้อ">🔀 สลับข้อ</button>
                <button id="reset-btn" class="btn-reset">รีเซ็ต</button>
            </div>
        </header>
        
        <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
        
        <div id="quiz-container" class="quiz-container">
            <div class="loading">กำลังโหลดข้อสอบ...</div>
        </div>
        
        <div id="result-container" class="result-container hidden">
            <h2>🏆 ผลคะแนน</h2>
            <div id="score-display" class="score-display"></div>
            <div class="result-actions">
                <button id="retry-btn" class="btn-primary">ทำใหม่</button>
                <button id="home-btn" class="btn-secondary">กลับหน้าแรก</button>
            </div>
        </div>
    </div>
    
    <script src="quiz.js"></script>
</body>
</html>
